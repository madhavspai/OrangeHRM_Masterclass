name: OrangeHRM Regression Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ui-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # Updated to v5 (latest)
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Behave Tests
      # Added 'continue-on-error' or 'if: always()' logic below to ensure we get reports
      run: behave -f allure_behave.formatter:AllureFormatter -o reports/ features/

    - name: Upload Test Artifacts (Logs & Allure Results)
      if: always() # IMPORTANT: Captures results even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: regression-test-results
        path: |
          logs/
          reports/
      # This saves BOTH your raw logs and your Allure JSON results in one zip file.